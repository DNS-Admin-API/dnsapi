openapi: 3.1.0
info:
  title: DNS-API
  version: '1.0'
tags: []
paths:
  /servers:
    get:
      operationId: servers_getZones
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Zone'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverid:
                  type: string
              required:
                - serverid
    post:
      operationId: servers_createZone
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverid:
                  type: string
                domainname:
                  type: string
              required:
                - serverid
                - domainname
  /servers/zones:
    get:
      operationId: zones_getZone
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverid:
                  type: string
                zoneid:
                  type: string
              required:
                - serverid
                - zoneid
    delete:
      operationId: zones_deleteZone
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverid:
                  type: string
                zoneid:
                  type: string
              required:
                - serverid
                - zoneid
    patch:
      operationId: zones_updateZone
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverid:
                  type: string
                zoneid:
                  type: string
                change:
                  $ref: '#/components/schemas/RRSet'
              required:
                - serverid
                - zoneid
                - change
    put:
      operationId: zones_replaceZoneContent
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverid:
                  type: string
                zoneid:
                  type: string
                body:
                  $ref: '#/components/schemas/Zone'
              required:
                - serverid
                - zoneid
                - body
  /servers/zones/export:
    get:
      operationId: zones_getZoneAXFR
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            text/plain:
              schema:
                type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serverid:
                  type: string
                zoneid:
                  type: string
              required:
                - serverid
                - zoneid
components:
  schemas:
    Comment:
      type: object
      required:
        - text
      properties:
        text:
          type: string
    Extension:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    RRSet:
      type: object
      required:
        - name
        - type
        - ttl
        - changetype
        - record
        - comments
      properties:
        name:
          type: string
        type:
          type: string
        ttl:
          type: integer
          format: int32
        changetype:
          $ref: '#/components/schemas/changetype'
        record:
          type: array
          items:
            $ref: '#/components/schemas/RecordData'
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
    RecordData:
      type: object
      required:
        - data
      properties:
        data:
          type: string
    Server:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/servertype'
    ServerParameters:
      type: object
      required:
        - serverid
      properties:
        serverid:
          type: string
    Versions:
      type: string
      enum:
        - '1.0'
    Zone:
      type: object
      required:
        - id
        - name
        - type
        - url
        - kind
        - rrsets
        - serial
        - notified_serial
        - edited_serial
        - primaries
        - dnssec
        - catalog
        - extensions
      properties:
        id:
          type: string
          minLength: 2
        name:
          type: string
        type:
          type: string
        url:
          type: string
        kind:
          type: string
        rrsets:
          type: array
          items:
            $ref: '#/components/schemas/RRSet'
        serial:
          type: integer
          format: int32
        notified_serial:
          type: integer
          format: int32
        edited_serial:
          type: integer
          format: int32
        primaries:
          type: array
          items:
            type: string
        dnssec:
          type: boolean
        catalog:
          type: string
        extensions:
          type: array
          items:
            $ref: '#/components/schemas/Extension'
    ZoneParameters:
      type: object
      required:
        - serverid
        - zoneid
      properties:
        serverid:
          type: string
        zoneid:
          type: string
    changetype:
      type: string
      enum:
        - replace
        - add
        - update
        - delete
    servertype:
      type: string
      enum:
        - bind9
        - knot
        - nsd
        - powerdns
        - windows
